name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want to add or change?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: false
  - type: textarea
    id: approach
    attributes:
      label: Proposed Approach
      description: How should this be implemented? (optional)
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - extractors
        - analyzers
        - outputs/visualization
        - cli
        - models
        - tests
        - ci/tooling
        - other
    validations:
      required: true
